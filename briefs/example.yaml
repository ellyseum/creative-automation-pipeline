# Summer Launch 2026 — Morning Co.
# Example campaign brief for the creative automation pipeline.
# Two products, en-US market, millennials target audience.
#
# Assets:
#   hero_asset  — explicit hero image to use (skips AI generation)
#   assets      — additional reference images (indexed for RAG retrieval)
#
# If hero_asset is missing or the file doesn't exist in storage,
# the Creative Director uses RAG to search the library and decides
# whether to reuse an existing asset, use one as a style reference,
# or generate a new hero from scratch.

brand:
  id: morning-co
  name: Morning Co.
  logo: assets/brands/morning-co/logo.png
  palette:
    - "#FF5733"   # Vibrant coral — primary accent
    - "#1A1A1A"   # Near-black — text, bars
    - "#F5F5F0"   # Warm off-white — backgrounds
  tone: "energetic, minimal, health-forward"

campaign:
  name: "Summer Launch 2026"
  message: "Level Up Your Morning"

region: en-US
audience: "millennials, urban, health-conscious"

products:
  - id: solar-flask
    name: Solar Flask 1L
    description: Premium copper-lined insulated water bottle with minimalist design
    # hero_asset declared — pipeline will use this
    hero_asset: assets/products/solar-flask/hero.jpg

  - id: dawn-brew
    name: Dawn Brew Tea
    description: Organic morning tea blend with adaptogens for sustained energy
    # No hero_asset dedclared — pipeline will pull the declared reference below via RAG as a reference for generation
    assets:
      - assets/products/dawn-brew/packaging.jpg
